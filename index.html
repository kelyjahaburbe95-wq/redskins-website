<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Redskins Franconville</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--white:#fff;--bg:#f5f5f5;--border:#e8e8e8;--text:#1c1c1c;--text-mid:#555;--text-light:#999;--red:#e00;--black:#111;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* LAYOUT */
.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--black);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo span{font-size:16px;font-weight:700;color:#fff;}
.sidebar-logo small{display:block;font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.sidebar-logo em{color:var(--red);font-style:normal;}
.sidebar-nav{padding:16px 0;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;transition:color 0.2s,background 0.2s;border-left:3px solid transparent;}
.sidebar-item:hover{color:#fff;background:rgba(255,255,255,0.05);}
.sidebar-item.active{color:#fff;background:rgba(255,255,255,0.08);border-left-color:var(--red);}
.sidebar-item-icon{font-size:16px;}
.sidebar-section{padding:12px 20px 4px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);}

/* MAIN */
.admin-main{padding:32px;overflow-y:auto;}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;}
.admin-header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}
.btn-logout{background:#fff;border:1px solid var(--border);color:var(--text-mid);padding:8px 16px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color 0.2s;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px;}
.stat-card-num{font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px;}
.stat-card-num.red{color:var(--red);}
.stat-card-label{font-size:12px;color:var(--text-light);}

/* FORM */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:28px;margin-bottom:24px;}
.form-card-title{font-size:16px;font-weight:700;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;font-weight:600;color:var(--text);}
.form-input,.form-select,.form-textarea{padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;background:#fff;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--text);}
.form-textarea{resize:vertical;min-height:80px;}

/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color 0.2s;position:relative;}
.upload-zone:hover{border-color:var(--text-mid);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-icon{font-size:32px;margin-bottom:8px;}
.upload-zone-text{font-size:13px;color:var(--text-mid);}
.photos-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.photo-item{position:relative;width:72px;height:90px;}
.photo-item img{width:100%;height:100%;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.photo-item-del{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:12px;margin:16px 0;}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background 0.3s;flex-shrink:0;}
.toggle.on{background:var(--red);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left 0.3s;}
.toggle.on::after{left:23px;}
.toggle-label{font-size:13px;font-weight:500;}
.promo-fields{display:none;}
.promo-fields.show{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* BTN */
.btn-primary{background:var(--black);color:#fff;padding:12px 24px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn-primary:hover{background:var(--red);}
.btn-danger{background:none;border:1px solid var(--border);color:var(--text-mid);padding:6px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-danger:hover{border-color:var(--red);color:var(--red);}
.btn-edit{background:none;border:1px solid var(--border);color:var(--text-mid);padding:6px 12px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-edit:hover{border-color:var(--text);color:var(--text);}

/* TABLE */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-light);padding:12px 16px;text-align:left;background:var(--bg);border-bottom:1px solid var(--border);}
td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--bg);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.prod-thumb{width:48px;height:60px;object-fit:cover;border-radius:4px;background:var(--bg);}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:2px;}
.badge-promo{background:rgba(238,0,0,0.1);color:var(--red);}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--black);color:#fff;padding:12px 20px;border-radius:4px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:transform 0.3s,opacity 0.3s;z-index:999;}
.notif.show{transform:translateY(0);opacity:1;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;overflow-y:auto;padding:40px 24px;}
.modal{max-width:640px;margin:0 auto;background:#fff;border-radius:8px;padding:32px;position:relative;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:var(--text-light);cursor:pointer;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:24px;}

/* ACCES REFUSE */
.acces-refuse{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;}
.acces-refuse-box{padding:60px 40px;}
.acces-refuse-icon{font-size:48px;margin-bottom:16px;}
.acces-refuse h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.acces-refuse p{font-size:14px;color:var(--text-mid);margin-bottom:24px;}
.btn-link{display:inline-block;background:var(--black);color:#fff;padding:12px 28px;border-radius:4px;font-size:13px;font-weight:600;}

@media(max-width:900px){.admin-layout{grid-template-columns:1fr;}.sidebar{display:none;}.stats-grid{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}}

.topbar{background:#111;color:rgba(255,255,255,0.8);text-align:center;padding:8px;font-size:12px;}
.topbar strong{color:#fff;}
nav{background:#fff;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:200;}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;max-width:1400px;margin:0 auto;}
.nav-logo{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:#1c1c1c;text-decoration:none;}
.nav-logo span{color:#e00;}
.nav-search{flex:1;max-width:480px;margin:0 32px;position:relative;}
.nav-search input{width:100%;padding:10px 44px 10px 16px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:4px;font-family:inherit;font-size:13px;color:#1c1c1c;outline:none;transition:border-color 0.2s;}
.nav-search input:focus{border-color:#1c1c1c;background:#fff;}
.nav-search input::placeholder{color:#999;}
.nav-search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#999;}
.nav-actions{display:flex;align-items:center;gap:4px;}
.nav-action{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;color:#555;font-size:10px;font-weight:500;border-radius:4px;transition:color 0.2s;text-decoration:none;}
.nav-action:hover{color:#1c1c1c;background:#f5f5f5;}
.nav-action-icon{font-size:18px;}
.nav-action-cart{background:#e00;color:#fff;border-radius:4px;}
.nav-action-cart:hover{background:#cc0000;color:#fff;}
.nav-bottom{border-top:1px solid #e8e8e8;}
.nav-bottom-inner{display:flex;align-items:center;max-width:1400px;margin:0 auto;padding:0 32px;overflow-x:auto;}
.nav-brand{padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:0.3px;color:#555;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.2s,border-color 0.2s;text-decoration:none;display:block;}
.nav-brand:hover{color:#1c1c1c;border-bottom-color:#e00;}
@media(max-width:768px){.nav-top{padding:0 16px;}.nav-search{display:none;}.nav-bottom-inner{padding:0 16px;}}

</style>
</head>
<body>

<div id="app"></div>
<div class="notif" id="notif"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <div class="modal-title">Modifier le produit</div>
    <div class="form-grid" id="modal-form"></div>
    <div style="margin-top:20px;"><button class="btn-primary" onclick="sauvegarderModif()">Sauvegarder</button></div>
  </div>
</div>

<script>
const session = JSON.parse(localStorage.getItem('rf-session') || 'null');
const app = document.getElementById('app');
let photosBase64 = [], promoActif = false, currentEditId = null, photosModalB64 = [], promoModalActif = false;

if (!session || !session.admin) {
  app.innerHTML = `<div class="acces-refuse"><div class="acces-refuse-box">
    <div class="acces-refuse-icon">🔒</div>
    <h2>Accès refusé</h2>
    <p>Vous devez être administrateur pour accéder à cette page.</p>
    <a href="compte.html" class="btn-link">Se connecter</a>
  </div></div>`;
} else {
  renderAdmin();
}

async function renderAdmin() {
  const produits = await getProduits();
  const users = JSON.parse(localStorage.getItem('rf-users') || '[]');
  const cart = JSON.parse(localStorage.getItem('redskins-cart') || '[]');
  const totalPanier = cart.reduce((a,i) => a+i.price*i.qty, 0);

  app.innerHTML = `
  <div class="admin-layout">
    <div class="sidebar">
      <div class="sidebar-logo">
        <span>Redskins <em>Franconville</em></span>
        <small>Administration</small>
      </div>
      <div class="sidebar-nav">
        <div class="sidebar-section">Menu</div>
        <div class="sidebar-item active" onclick="showPanel('produits',this)"><span class="sidebar-item-icon">🛍️</span> Produits</div>
        <div class="sidebar-item" onclick="showPanel('clients',this)"><span class="sidebar-item-icon">👥</span> Clients</div>
        <div class="sidebar-item" onclick="showPanel('stats',this)"><span class="sidebar-item-icon">📊</span> Statistiques</div>
        <div class="sidebar-item" onclick="showPanel('flash',this)"><span class="sidebar-item-icon">⚡</span> Vente Flash</div>
        <div class="sidebar-section">Accès rapide</div>
        <div class="sidebar-item" onclick="window.open('index.html')"><span class="sidebar-item-icon">🌐</span> Voir le site</div>
        <div class="sidebar-item" onclick="logout()"><span class="sidebar-item-icon">🚪</span> Déconnexion</div>
      </div>
    </div>
    <div class="admin-main">
      <div class="admin-header">
        <h1 id="panel-title">Produits</h1>
        <button class="btn-logout" onclick="logout()">Déconnexion</button>
      </div>

      <!-- PRODUITS -->
      <div class="panel active" id="panel-produits">
        <div class="form-card">
          <div class="form-card-title">Ajouter un produit</div>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Marque</label>
              <select class="form-select" id="p-marque">
                <option value="">— Choisir —</option>
                <option>Guess</option><option>Boss</option><option>Hugo</option>
                <option>Levis</option><option>Timberland</option><option>Lacoste</option>
                <option>Chabrand</option><option>Redskins</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Nom du produit</label><input type="text" class="form-input" id="p-nom" placeholder="Ex: BLOUSON CUIR NOIR"></div>
            <div class="form-group"><label class="form-label">Référence</label><input type="text" class="form-input" id="p-ref" placeholder="Ex: RS2024-001"></div>
            <div class="form-group"><label class="form-label">Catégorie</label>
              <select class="form-select" id="p-categorie">
                <option>Vêtements</option><option>Chaussures</option><option>Accessoires</option><option>Cuir</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Genre</label>
              <select class="form-select" id="p-genre">
                <option>Homme</option><option>Femme</option><option>Mixte</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Type</label>
              <select class="form-select" id="p-sous-categorie">
                <option value="">—</option><option>Pantalon</option><option>Jean</option><option>Pull</option><option>Sweat</option><option>T-shirt</option><option>Chemise</option><option>Polo</option><option>Veste</option><option>Manteau</option><option>Blouson</option><option>Robe</option><option>Jupe</option><option>Sneakers</option><option>Boots</option><option>Mocassins</option><option>Sac</option><option>Ceinture</option><option>Portefeuille</option><option>Lunettes</option><option>Montre</option><option>Casquette</option><option>Écharpe</option><option>Autre</option>
              </select>
            </div>
            <div class="form-group form-full"><label class="form-label">Description</label><textarea class="form-textarea" id="p-desc" placeholder="Description du produit..."></textarea></div>
            <div class="form-group"><label class="form-label">Prix (€)</label><input type="number" class="form-input" id="p-prix" placeholder="99"></div>
            <div class="form-group"><label class="form-label">Tailles (séparées par virgule)</label><input type="text" class="form-input" id="p-tailles" placeholder="S,M,L,XL ou 39,40,41"></div>
            <div class="form-group form-full"><label class="form-label">Couleurs (séparées par virgule)</label><input type="text" class="form-input" id="p-couleurs" placeholder="Noir,Blanc,Rouge"></div>
          </div>

          <div class="toggle-row" style="margin-top:16px;">
            <div class="toggle" id="promo-toggle" onclick="togglePromo()"></div>
            <span class="toggle-label">Activer une réduction</span>
          </div>
          <div class="promo-fields" id="promo-fields">
            <div class="form-group"><label class="form-label">Prix réduit (€)</label><input type="number" class="form-input" id="p-prix-reduit"></div>
            <div class="form-group"><label class="form-label">Libellé</label><input type="text" class="form-input" id="p-promo-label" placeholder="-20% Soldes"></div>
          </div>

          <div style="margin-top:20px;">
            <label class="form-label" style="margin-bottom:8px;">Photos</label>
            <div class="upload-zone" onclick="document.getElementById('p-photos').click()">
              <input type="file" id="p-photos" accept="image/*,.avif,.webp" multiple onchange="handlePhotos(event)">
              <div class="upload-zone-icon">📸</div>
              <div class="upload-zone-text">Cliquer pour ajouter des photos</div>
            </div>
            <div class="photos-preview" id="photos-preview"></div>
          </div>

          <button class="btn-primary" style="margin-top:24px;" onclick="ajouterProduit()">+ Ajouter le produit</button>
        </div>

        <div class="table-wrap" id="liste-produits"></div>
      </div>

      <!-- CLIENTS -->
      <div class="panel" id="panel-clients">
        <div class="table-wrap">
          ${users.length === 0
            ? '<p style="padding:40px;text-align:center;color:var(--text-light);">Aucun compte client.</p>'
            : `<table><thead><tr><th>Nom</th><th>Email</th><th>Inscription</th><th>Action</th></tr></thead>
               <tbody>${users.map((u,i) => `<tr><td>${u.nom}</td><td>${u.email}</td><td>${u.date||'—'}</td>
               <td><button class="btn-danger" onclick="supprimerClient(${i})">Supprimer</button></td></tr>`).join('')}</tbody></table>`}
        </div>
      </div>

      <!-- STATS -->
      <div class="panel" id="panel-stats">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-card-num red">${produits.length}</div><div class="stat-card-label">Produits en ligne</div></div>
          <div class="stat-card"><div class="stat-card-num">${users.length}</div><div class="stat-card-label">Clients inscrits</div></div>
          <div class="stat-card"><div class="stat-card-num">${cart.reduce((a,i)=>a+i.qty,0)}</div><div class="stat-card-label">Articles en panier</div></div>
          <div class="stat-card"><div class="stat-card-num">${totalPanier.toFixed(0)} €</div><div class="stat-card-label">Valeur panier</div></div>
        </div>
        ${cart.length > 0 ? `
        <div class="table-wrap">
          <table><thead><tr><th>Produit</th><th>Marque</th><th>Qté</th><th>Prix</th><th>Total</th></tr></thead>
          <tbody>${cart.map(i=>`<tr><td>${i.name}</td><td>${i.brand||'—'}</td><td>${i.qty}</td><td>${i.price} €</td><td>${(i.price*i.qty).toFixed(2)} €</td></tr>`).join('')}</tbody>
          </table></div>` : '<p style="color:var(--text-light);padding:20px;">Panier vide.</p>'}
      </div>
    </div>
  </div>`;

  renderProduits();
}

function showPanel(name, el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const titles = {produits:'Produits', clients:'Clients', stats:'Statistiques'};
  document.getElementById('panel-title').textContent = titles[name] || '';
}

function togglePromo() {
  promoActif = !promoActif;
  document.getElementById('promo-toggle').classList.toggle('on', promoActif);
  document.getElementById('promo-fields').classList.toggle('show', promoActif);
}

function handlePhotos(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { photosBase64.push(ev.target.result); renderPreviews(); };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  const el = document.getElementById('photos-preview');
  if (!el) return;
  el.innerHTML = photosBase64.map((src,i) => `
    <div class="photo-item">
      <img src="${src}" alt="photo ${i+1}">
      <button class="photo-item-del" onclick="supprimerPhoto(${i})">✕</button>
    </div>`).join('');
}

function supprimerPhoto(i) { photosBase64.splice(i,1); renderPreviews(); }

async function getProduits() {
  return JSON.parse(localStorage.getItem('rf-produits') || '[]');
}

async function ajouterProduit() {
  const marque = document.getElementById('p-marque').value;
  const nom = document.getElementById('p-nom').value.trim().toUpperCase();
  const prix = parseFloat(document.getElementById('p-prix').value);
  if (!marque || !nom || !prix) { showNotif('⚠️ Marque, nom et prix obligatoires'); return; }

  const pages = {Guess:'guess.html',Boss:'boss.html',Hugo:'hugo.html',Levis:'levis.html',Timberland:'timberland.html',Lacoste:'lacoste.html',Chabrand:'chabrand.html',Redskins:'redskins-brand.html'};
  const produit = {
    id: marque.toLowerCase() + '-' + Date.now(),
    nom, marque,
    ref: document.getElementById('p-ref').value.trim(),
    categorie: document.getElementById('p-categorie').value,
    genre: document.getElementById('p-genre').value,
    sous_categorie: document.getElementById('p-sous-categorie').value,
    desc: document.getElementById('p-desc').value.trim(),
    prix, tailles: document.getElementById('p-tailles').value.split(',').map(t=>t.trim()).filter(Boolean),
    couleurs: document.getElementById('p-couleurs').value.split(',').map(c=>c.trim()).filter(Boolean),
    promoActif, prixReduit: promoActif ? parseFloat(document.getElementById('p-prix-reduit').value) : null,
    promoLabel: promoActif ? document.getElementById('p-promo-label').value.trim() : null,
    photos: photosBase64, page: pages[marque] || 'index.html'
  };

  const local = JSON.parse(localStorage.getItem('rf-produits') || '[]');
  local.push(produit);
  localStorage.setItem('rf-produits', JSON.stringify(local));

  // Reset
  ['p-nom','p-ref','p-desc','p-prix','p-tailles','p-couleurs','p-prix-reduit','p-promo-label'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  document.getElementById('p-marque').value = '';
  photosBase64 = [];
  document.getElementById('photos-preview').innerHTML = '';
  if (promoActif) togglePromo();
  showNotif('✓ Produit ajouté !');
  renderProduits();
}

async function renderProduits() {
  const produits = await getProduits();
  const el = document.getElementById('liste-produits');
  if (!el) return;
  if (!produits.length) { el.innerHTML = '<p style="padding:40px;text-align:center;color:var(--text-light);">Aucun produit. Ajoutez-en un ci-dessus.</p>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Photo</th><th>Produit</th><th>Marque</th><th>Prix</th><th>Tailles</th><th>Actions</th></tr></thead>
    <tbody>${produits.map(p => `
      <tr>
        <td>${p.photos&&p.photos[0] ? `<img src="${p.photos[0]}" class="prod-thumb" alt="${p.nom}">` : '<div style="width:48px;height:60px;background:var(--bg);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;">📷</div>'}</td>
        <td><div style="font-weight:600">${p.nom}</div><div style="font-size:11px;color:var(--text-light);">${p.ref||''}</div></td>
        <td>${p.marque}</td>
        <td>
          ${p.promoActif&&p.prixReduit
            ? `<span style="font-weight:700;color:var(--red)">${p.prixReduit} €</span> <span style="font-size:11px;text-decoration:line-through;color:var(--text-light)">${p.prix} €</span>`
            : `<span style="font-weight:700">${p.prix} €</span>`}
        </td>
        <td><span style="font-size:12px;color:var(--text-mid)">${(p.tailles||[]).join(', ')}</span></td>
        <td style="display:flex;gap:8px;">
          <button class="btn-edit" onclick="modifierProduit('${p.id}')">Modifier</button>
          <button class="btn-danger" onclick="supprimerProduit('${p.id}')">Supprimer</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function supprimerProduit(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  const local = JSON.parse(localStorage.getItem('rf-produits') || '[]').filter(p => p.id !== id);
  localStorage.setItem('rf-produits', JSON.stringify(local));
  showNotif('✓ Produit supprimé'); renderProduits();
}

async function modifierProduit(id) {
  const produits = await getProduits();
  const p = produits.find(x => x.id === id);
  if (!p) return;
  currentEditId = id;
  photosModalB64 = p.photos ? [...p.photos] : [];
  promoModalActif = p.promoActif || false;

  document.getElementById('modal-form').innerHTML = `
    <div class="form-group"><label class="form-label">Marque</label>
      <select class="form-select" id="m-marque">
        ${['Guess','Boss','Hugo','Levis','Timberland','Lacoste','Chabrand','Redskins'].map(m=>`<option${m===p.marque?' selected':''}>${m}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Nom</label><input type="text" class="form-input" id="m-nom" value="${p.nom||''}"></div>
    <div class="form-group"><label class="form-label">Référence</label><input type="text" class="form-input" id="m-ref" value="${p.ref||''}"></div>
    <div class="form-group"><label class="form-label">Catégorie</label>
      <select class="form-select" id="m-categorie">
        ${['Vêtements','Chaussures','Accessoires','Cuir'].map(c=>`<option${c===p.categorie?' selected':''}>${c}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Genre</label>
      <select class="form-select" id="m-genre">
        ${['Homme','Femme','Mixte'].map(g=>`<option${g===(p.genre||'')?' selected':''}>${g}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Type</label>
      <select class="form-select" id="m-sous-categorie">
        <option value="">—</option>${['Pantalon','Jean','Pull','Sweat','T-shirt','Chemise','Polo','Veste','Manteau','Blouson','Robe','Jupe','Sneakers','Boots','Mocassins','Sac','Ceinture','Portefeuille','Lunettes','Montre','Casquette','Écharpe','Autre'].map(t=>`<option${t===(p.sous_categorie||'')?' selected':''}>${t}</option>`).join('')}
      </select></div>
    <div class="form-group form-full"><label class="form-label">Description</label><textarea class="form-textarea" id="m-desc">${p.desc||''}</textarea></div>
    <div class="form-group"><label class="form-label">Prix (€)</label><input type="number" class="form-input" id="m-prix" value="${p.prix||''}"></div>
    <div class="form-group"><label class="form-label">Tailles</label><input type="text" class="form-input" id="m-tailles" value="${(p.tailles||[]).join(',')}"></div>
    <div class="form-group form-full"><label class="form-label">Couleurs</label><input type="text" class="form-input" id="m-couleurs" value="${(p.couleurs||[]).join(',')}"></div>
    <div class="form-group form-full">
      <div class="toggle-row"><div class="toggle${promoModalActif?' on':''}" id="m-toggle" onclick="togglePromoModal()"></div><span class="toggle-label">Réduction</span></div>
      <div class="promo-fields${promoModalActif?' show':''}" id="m-promo">
        <div class="form-group"><label class="form-label">Prix réduit</label><input type="number" class="form-input" id="m-prix-reduit" value="${p.prixReduit||''}"></div>
        <div class="form-group"><label class="form-label">Libellé</label><input type="text" class="form-input" id="m-promo-label" value="${p.promoLabel||''}"></div>
      </div>
    </div>
    <div class="form-group form-full">
      <label class="form-label" style="margin-bottom:8px;">Photos</label>
      <div class="upload-zone" onclick="document.getElementById('m-photos').click()">
        <input type="file" id="m-photos" accept="image/*,.avif,.webp" multiple onchange="handlePhotosModal(event)">
        <div class="upload-zone-icon">📸</div>
        <div class="upload-zone-text">Ajouter/remplacer des photos</div>
      </div>
      <div class="photos-preview" id="m-photos-preview"></div>
    </div>`;

  renderPhotosModal();
  document.getElementById('modal-overlay').style.display = 'block';
}

function fermerModal() { document.getElementById('modal-overlay').style.display = 'none'; currentEditId = null; }

function togglePromoModal() {
  promoModalActif = !promoModalActif;
  document.getElementById('m-toggle').classList.toggle('on', promoModalActif);
  document.getElementById('m-promo').classList.toggle('show', promoModalActif);
}

function handlePhotosModal(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { photosModalB64.push(ev.target.result); renderPhotosModal(); };
    reader.readAsDataURL(file);
  });
}

function renderPhotosModal() {
  const el = document.getElementById('m-photos-preview');
  if (!el) return;
  el.innerHTML = photosModalB64.map((src,i) => `
    <div class="photo-item"><img src="${src}"><button class="photo-item-del" onclick="suppPhotoModal(${i})">✕</button></div>`).join('');
}

function suppPhotoModal(i) { photosModalB64.splice(i,1); renderPhotosModal(); }

async function sauvegarderModif() {
  const pages = {Guess:'guess.html',Boss:'boss.html',Hugo:'hugo.html',Levis:'levis.html',Timberland:'timberland.html',Lacoste:'lacoste.html',Chabrand:'chabrand.html',Redskins:'redskins-brand.html'};
  const marque = document.getElementById('m-marque').value;
  const updates = {
    marque, nom: document.getElementById('m-nom').value.trim().toUpperCase(),
    ref: document.getElementById('m-ref').value.trim(),
    categorie: document.getElementById('m-categorie').value,
    genre: document.getElementById('m-genre').value,
    sous_categorie: document.getElementById('m-sous-categorie').value,
    desc: document.getElementById('m-desc').value.trim(),
    prix: parseFloat(document.getElementById('m-prix').value),
    tailles: document.getElementById('m-tailles').value.split(',').map(t=>t.trim()).filter(Boolean),
    couleurs: document.getElementById('m-couleurs').value.split(',').map(c=>c.trim()).filter(Boolean),
    promoActif: promoModalActif,
    prixReduit: promoModalActif ? parseFloat(document.getElementById('m-prix-reduit').value) : null,
    promoLabel: promoModalActif ? document.getElementById('m-promo-label').value.trim() : null,
    photos: photosModalB64,
    page: pages[marque] || 'index.html'
  };

  const local = JSON.parse(localStorage.getItem('rf-produits') || '[]');
  const i = local.findIndex(p => p.id === currentEditId);
  if (i !== -1) local[i] = {...local[i], ...updates};
  localStorage.setItem('rf-produits', JSON.stringify(local));

  fermerModal(); showNotif('✓ Produit modifié !'); renderProduits();
}

function supprimerClient(i) {
  if (!confirm('Supprimer ce compte ?')) return;
  const users = JSON.parse(localStorage.getItem('rf-users') || '[]');
  users.splice(i, 1);
  localStorage.setItem('rf-users', JSON.stringify(users));
  showNotif('✓ Compte supprimé'); renderAdmin();
}

function logout() { localStorage.removeItem('rf-session'); window.location.href = 'compte.html'; }


// ── VENTE FLASH ──
let flashActif = false;

function loadFlashAdmin() {
  const flash = JSON.parse(localStorage.getItem('rf-flash') || 'null');
  if (!flash) return;
  flashActif = flash.actif || false;
  document.getElementById('flash-toggle').classList.toggle('on', flashActif);
  document.getElementById('flash-titre').value = flash.titre || '';
  document.getElementById('flash-desc').value = flash.desc || '';
  document.getElementById('flash-btn-text').value = flash.btnText || '';
  if (flash.fin) document.getElementById('flash-fin').value = flash.fin.slice(0,16);
  updatePreview();
}

function toggleFlash() {
  flashActif = !flashActif;
  document.getElementById('flash-toggle').classList.toggle('on', flashActif);
}

function updatePreview() {
  const titre = document.getElementById('flash-titre').value || 'Titre de la vente';
  const desc = document.getElementById('flash-desc').value || 'Description';
  const btn = document.getElementById('flash-btn-text').value || 'En profiter';
  const fin = document.getElementById('flash-fin').value;
  document.getElementById('preview-titre').textContent = titre;
  document.getElementById('preview-desc').textContent = desc;
  document.getElementById('preview-btn').textContent = btn;
  if (fin) {
    const diff = new Date(fin) - new Date();
    if (diff > 0) {
      const h = Math.floor(diff/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      document.getElementById('preview-h').textContent = String(h).padStart(2,'0');
      document.getElementById('preview-m').textContent = String(m).padStart(2,'0');
      document.getElementById('preview-s').textContent = String(s).padStart(2,'0');
    }
  }
}

function sauvegarderFlash() {
  const flash = {
    actif: flashActif,
    titre: document.getElementById('flash-titre').value,
    desc: document.getElementById('flash-desc').value,
    fin: document.getElementById('flash-fin').value,
    btnText: document.getElementById('flash-btn-text').value || 'En profiter'
  };
  localStorage.setItem('rf-flash', JSON.stringify(flash));
  showNotif('✓ Vente flash sauvegardée !');
  updatePreview();
}

// Écouter les changements pour l'aperçu
setTimeout(() => {
  ['flash-titre','flash-desc','flash-btn-text','flash-fin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updatePreview);
  });
  loadFlashAdmin();
}, 500);

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}
</script>
